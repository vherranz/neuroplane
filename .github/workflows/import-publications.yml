# Hugo Blox GitHub Action to convert Bibtex publications to Markdown-based webpages
name: Import Publications From Bibtex

# Require permission to create a PR
permissions:
  contents: write
  pull-requests: write

# Run workflow when a `.bib` file is added or updated in the `data/` folder
on:
  push:
    branches: ['main']
    paths: ['publications.bib']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  hugoblox:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install academic==0.10.0 pyyaml

      - name: Run Academic (Bibtex To Markdown Converter)
        # Check `.bib` file exists for case when action runs on `.bib` deletion
        # Note GH only provides hashFiles func in `steps.if` context, not `jobs.if` context
        if: ${{ hashFiles('publications.bib') != '' }}
        run: academic import publications.bib content/publication/ --compact --overwrite

      - name: Remove cite.bib files
        run: |
          find content/publication -type f -name "cite.bib" -delete

      - name: Remove URL buttons from imported publications
        run: |
          find content/publication -name "index.md" -print0 | xargs -0 perl -0777 -pi -e 's/links:\n- name: URL\n\s+url:.*\n//g'

      - name: Add PDF links to imported publications
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          pub_dir = Path("content/publication")
          pdf_dir = Path("static/files/papers")

          for md in pub_dir.glob("*/index.md"):
              slug = md.parent.name
              pdf = pdf_dir / f"{slug}.pdf"
              if not pdf.exists():
                  continue

              pdf_url = f"/files/papers/{slug}.pdf"
              text = md.read_text(encoding="utf-8")

              # Split YAML front matter
              if not text.startswith("---\n"):
                  continue

              parts = text.split("---\n", 2)
              if len(parts) < 3:
                  continue

              _, front_matter, body = parts

              if re.search(r"^url_pdf:\s*", front_matter, flags=re.M):
                  front_matter = re.sub(
                      r"^url_pdf:\s*.*$",
                      f"url_pdf: {pdf_url}",
                      front_matter,
                      flags=re.M,
                  )
              else:
                  if re.search(r"^doi:\s*.*$", front_matter, flags=re.M):
                      front_matter = re.sub(
                          r"^(doi:\s*.*)$",
                          r"\1\nurl_pdf: " + pdf_url,
                          front_matter,
                          count=1,
                          flags=re.M,
                      )
                  else:
                      front_matter = front_matter.rstrip() + f"\nurl_pdf: {pdf_url}\n"

              new_text = f"---\n{front_matter}---\n{body}"
              md.write_text(new_text, encoding="utf-8")
          PY

      - name: Create Pull Request
        # Set ID for `Check outputs` stage
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'content: import publications from Bibtex'
          title: Hugo Blox Builder - Import latest publications
          body: |
            Import the latest publications from `publications.bib` to `content/publication/`.
            将最新的出版物从`publications.bib`导入到`content/publication/`。
            [View Documentation](https://github.com/GetRD/academic-file-converter)
          base: main
          labels: automated-pr, content
          branch: hugoblox-import-publications
          delete-branch: true

      - name: Check outputs
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"